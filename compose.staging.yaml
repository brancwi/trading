# ============================================================
# Docker Compose — Overrides Staging
# Ports: 10xxx | DB: trading_staging | Env: staging
# ============================================================
# Usage:
#   docker compose -f compose.yaml -f compose.staging.yaml up -d

services:
  postgres:
    container_name: trading-postgres-staging
    environment:
      POSTGRES_DB: trading_staging
    ports:
      - "10005:5432"
    volumes:
      - postgres-data-staging:/var/lib/postgresql/data

  trading-api:
    container_name: trading-api-staging
    ports:
      - "10000:8000"
    env_file:
      - .env.staging
    environment:
      - DATABASE_URL=postgresql://trading:changeme@postgres:5432/trading_staging
      - MONITORING_DB_URL=sqlite:////app/data/monitoring_staging.db
      - PREFECT_API_URL=http://prefect-staging:10420/api
      - TRADING_ENVIRONMENT=staging

  trading-listener:
    container_name: trading-listener-staging
    env_file:
      - .env.staging
    environment:
      - DATABASE_URL=postgresql://trading:changeme@postgres:5432/trading_staging
      - MONITORING_DB_URL=sqlite:////app/data/monitoring_staging.db
      - PREFECT_API_URL=http://prefect-staging:10420/api
      - TRADING_ENVIRONMENT=staging

  mcp-server:
    container_name: trading-mcp-staging
    ports:
      - "10001:8001"
    env_file:
      - .env.staging
    environment:
      - DATABASE_URL=postgresql://trading:changeme@postgres:5432/trading_staging
      - MONITORING_DB_URL=sqlite:////app/data/monitoring_staging.db
      - FASTMCP_HOST=0.0.0.0
      - FASTMCP_PORT=8001
      - TRADING_ENVIRONMENT=staging

  prefect:
    container_name: prefect-staging
    image: trading-prefect-fixed:latest
    ports:
      - "10420:4200"
    env_file:
      - .env.staging
    environment:
      - DATABASE_URL=postgresql://trading:***@postgres:5432/trading_staging
      - MONITORING_DB_URL=sqlite:////app/data/monitoring_staging.db
      - PREFECT_API_URL=http://localhost:4200/api
      - PREFECT_SERVER_API_HOST=0.0.0.0
      - PREFECT_SERVER_API_PORT=4200
      - PREFECT_HOME=/data
      - PREFECT_SERVER_ALLOW_WILDCARD_CORS=true
      - TRADING_ENVIRONMENT=staging
    command: ["/app/scripts/start_prefect.sh"]
    volumes:
      - prefect-data-staging:/data
    depends_on:
      postgres:
        condition: service_healthy
    restart: unless-stopped
    networks:
      - trading-network

volumes:
  postgres-data-staging:
    driver: local
  prefect-data-staging:
    driver: local

networks:
  trading-network:
    external: true
