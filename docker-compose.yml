# ============================================================
# Docker Compose — Trading Engine V4.1
# Services : API, Listener, Prefect Server, Metabase
# ============================================================

version: "3.9"

services:
  # --------------------------------------------------------
  # 1. FastAPI — Hermes Control Plane
  # --------------------------------------------------------
  trading-api:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: trading-api
    command: >
      sh -c "python scripts/init_docker.py &&
             uvicorn trading.api.main:app
             --host 0.0.0.0
             --port 8000
             --reload"
    ports:
      - "8000:8000"
    volumes:
      - trading-data:/app/data
      - ./src:/app/src:ro
    env_file:
      - .env
    environment:
      - DATABASE_URL=sqlite:////app/data/trading.db
      - PREFECT_API_URL=http://prefect-server:4200/api
    networks:
      - trading-network
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8000/health"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 10s

  # --------------------------------------------------------
  # 2. Event Listener — WebSocket + Polling
  # --------------------------------------------------------
  trading-listener:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: trading-listener
    command: python scripts/run_listener.py
    volumes:
      - trading-data:/app/data
    env_file:
      - .env
    environment:
      - DATABASE_URL=sqlite:////app/data/trading.db
      - PREFECT_API_URL=http://prefect-server:4200/api
    networks:
      - trading-network
    depends_on:
      trading-api:
        condition: service_healthy
    restart: unless-stopped

  # --------------------------------------------------------
  # 3. Prefect Server — Orchestration UI + API
  # --------------------------------------------------------
  prefect-server:
    image: prefecthq/prefect:3-latest
    container_name: prefect-server
    command: >
      prefect server start
      --host 0.0.0.0
      --port 4200
    ports:
      - "4200:4200"
    volumes:
      - prefect-data:/data
    environment:
      - PREFECT_HOME=/data
      - PREFECT_API_DATABASE_CONNECTION_URL=sqlite+aiosqlite:////data/prefect.db
      - PREFECT_SERVER_ALLOW_WILDCARD_CORS=true
    networks:
      - trading-network
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:4200/api/health"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 15s

  # --------------------------------------------------------
  # 4. Metabase — Dashboard & Analytics
  # --------------------------------------------------------
  metabase:
    image: metabase/metabase:latest
    container_name: metabase
    ports:
      - "3000:3000"
    volumes:
      - metabase-data:/metabase-data
      - trading-data:/trading-data:ro
    environment:
      - MB_DB_TYPE=h2
      - MB_DB_FILE=/metabase-data/metabase.db
      - MB_JETTY_PORT=3000
      - MB_SITE_URL=http://localhost:3000
      - MB_ENABLE_EMBEDDING=false
      - MB_ANON_TRACKING_ENABLED=false
    networks:
      - trading-network
    depends_on:
      trading-api:
        condition: service_healthy

# --------------------------------------------------------
# Volumes
# --------------------------------------------------------
volumes:
  trading-data:
    driver: local
  prefect-data:
    driver: local
  metabase-data:
    driver: local

# --------------------------------------------------------
# Networks
# --------------------------------------------------------
networks:
  trading-network:
    driver: bridge
