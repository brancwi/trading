apiVersion: 1

datasources:
  - name: Trading Monitoring (TimescaleDB)
    type: postgres
    access: proxy
    url: trading-timescaledb:5432
    database: trading_monitoring
    user: monitoring
    secureJsonData:
      password: ${MONITORING_DB_PASSWORD:-monitoring_pass}
    jsonData:
      sslmode: disable
      maxOpenConns: 10
      maxIdleConns: 5
      connMaxLifetime: 14400
      postgresVersion: 1500
      timescaledb: true
    isDefault: true
    editable: false
